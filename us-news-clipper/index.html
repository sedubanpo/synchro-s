<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Real Estate Daily Clipper</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #18233f;
      --bg3: #2a1454;
      --text: #edf2ff;
      --muted: #b7c3e0;
      --line: rgba(255, 255, 255, 0.2);
      --glass: rgba(255, 255, 255, 0.14);
      --glass-strong: rgba(255, 255, 255, 0.2);
      --ok: #7ef0b4;
      --warn: #ff9c9c;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(1000px 600px at 0% 0%, #2a4fb8 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 20%, #6b2f9c 0%, transparent 58%),
        linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(50px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .orb.a { width: 260px; height: 260px; background: #69b6ff; top: -60px; left: -30px; }
    .orb.b { width: 340px; height: 340px; background: #ff89d0; right: -90px; top: 40%; }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1160px;
      margin: 0 auto;
      padding: 24px 16px 44px;
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      border-radius: var(--radius-lg);
    }

    .hero {
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .top-row {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: linear-gradient(145deg, rgba(120, 188, 255, 0.33), rgba(73, 214, 184, 0.25));
      color: #fff;
      font-weight: 800;
      font-size: 0.93rem;
      padding: 11px 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.06); }
    button:disabled { opacity: .7; cursor: not-allowed; }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: .9rem;
    }

    .chips {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, .27);
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .82rem;
      font-weight: 700;
    }

    .requirement {
      margin-top: 10px;
      font-weight: 700;
      font-size: .94rem;
    }

    .ok { color: var(--ok); }
    .warn { color: var(--warn); }

    .grid {
      margin-top: 18px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      border-radius: var(--radius-md);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .count {
      color: var(--muted);
      font-size: .84rem;
      font-weight: 700;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 470px;
      overflow: auto;
    }

    .item {
      padding: 12px 13px;
      border-bottom: 1px solid rgba(255,255,255,.13);
      animation: slideIn .24s ease;
    }

    .item:last-child { border-bottom: none; }

    .item a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      line-height: 1.4;
      display: block;
    }

    .item a:hover { text-decoration: underline; }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: .78rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .foot {
      margin-top: 12px;
      color: var(--muted);
      font-size: .87rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
      .status { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>

  <main class="wrap">
    <section class="glass hero">
      <h1>미국 부동산 데일리 뉴스 클리퍼</h1>
      <p class="sub">매일 미국 모기지 대출, 미국 부동산, 미주 한인 부동산 영문 기사를 자동 수집·분류합니다.</p>

      <div class="top-row">
        <button id="refreshBtn">지금 클립 갱신</button>
        <div class="status" id="status">초기화 중...</div>
      </div>

      <div class="chips">
        <span class="chip">카테고리 분류</span>
        <span class="chip">모기지 금리 기사 필수 포함</span>
        <span class="chip">미주 한인 기사 포함</span>
      </div>

      <div id="mustIncludeState" class="requirement"></div>
    </section>

    <section class="grid" id="newsGrid">
      <article class="panel">
        <div class="panel-head">미국 모기지 대출 금리 <span class="count" id="countMortgage">0건</span></div>
        <ul class="list" id="listMortgage"></ul>
      </article>
      <article class="panel">
        <div class="panel-head">미국 부동산 일반 <span class="count" id="countRealEstate">0건</span></div>
        <ul class="list" id="listRealEstate"></ul>
      </article>
      <article class="panel">
        <div class="panel-head">미주 한인 부동산 <span class="count" id="countKoreanAmerican">0건</span></div>
        <ul class="list" id="listKoreanAmerican"></ul>
      </article>
    </section>

    <p class="foot">기본 수집 기간은 최근 24시간이며, 30분마다 자동 갱신됩니다. 데이터 소스: Google News RSS 검색 결과.</p>
  </main>

  <script>
    const CATEGORY = {
      MORTGAGE: "mortgage",
      REAL_ESTATE: "real_estate",
      KOREAN_AMERICAN: "korean_american"
    };

    const FEEDS = [
      { category: CATEGORY.MORTGAGE, query: 'US mortgage rates when:1d', label: '미국 모기지 대출 금리' },
      { category: CATEGORY.REAL_ESTATE, query: 'US real estate housing market when:1d', label: '미국 부동산 일반' },
      { category: CATEGORY.KOREAN_AMERICAN, query: 'Korean American real estate US when:7d', label: '미주 한인 부동산' }
    ];

    const FALLBACK_MORTGAGE_ARTICLE = {
      title: 'Mortgage News Daily - Mortgage Rates (Backup)',
      link: 'https://www.mortgagenewsdaily.com/mortgage-rates',
      pubDate: new Date().toISOString(),
      source: 'Mortgage News Daily',
      description: 'Backup source inserted to satisfy mandatory mortgage-rate coverage.'
    };

    const els = {
      refreshBtn: document.getElementById('refreshBtn'),
      status: document.getElementById('status'),
      mustIncludeState: document.getElementById('mustIncludeState'),
      listMortgage: document.getElementById('listMortgage'),
      listRealEstate: document.getElementById('listRealEstate'),
      listKoreanAmerican: document.getElementById('listKoreanAmerican'),
      countMortgage: document.getElementById('countMortgage'),
      countRealEstate: document.getElementById('countRealEstate'),
      countKoreanAmerican: document.getElementById('countKoreanAmerican')
    };

    function buildGoogleRssUrl(query) {
      const encoded = encodeURIComponent(query);
      return `https://news.google.com/rss/search?q=${encoded}&hl=en-US&gl=US&ceid=US:en`;
    }

    async function fetchGoogleRssItems(rssUrl) {
      const encoded = encodeURIComponent(rssUrl);
      const rawUrl = `https://api.allorigins.win/raw?url=${encoded}`;
      const getUrl = `https://api.allorigins.win/get?url=${encoded}`;
      let xmlText = '';

      try {
        const rawRes = await fetch(rawUrl, { cache: 'no-store' });
        if (!rawRes.ok) throw new Error(`raw proxy ${rawRes.status}`);
        xmlText = await rawRes.text();
      } catch (rawError) {
        const getRes = await fetch(getUrl, { cache: 'no-store' });
        if (!getRes.ok) throw new Error(`RSS proxy error: ${getRes.status}`);
        const getData = await getRes.json();
        xmlText = getData.contents || '';
        if (!xmlText) throw new Error('RSS proxy empty response');
      }

      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      if (doc.querySelector('parsererror')) throw new Error('RSS parse error');

      const nodes = Array.from(doc.querySelectorAll('item')).slice(0, 20);
      return nodes.map((node) => {
        const title = node.querySelector('title')?.textContent?.trim() || '(제목 없음)';
        const link = node.querySelector('link')?.textContent?.trim() || '#';
        const pubDate = node.querySelector('pubDate')?.textContent?.trim() || new Date().toISOString();
        const source = node.querySelector('source')?.textContent?.trim() || 'Google News';
        const description = node.querySelector('description')?.textContent?.trim() || '';
        return { title, link, pubDate, source, description };
      });
    }

    function dedupeByLink(items) {
      const seen = new Set();
      return items.filter((item) => {
        if (!item.link || seen.has(item.link)) return false;
        seen.add(item.link);
        return true;
      });
    }

    function sortByRecent(items) {
      return [...items].sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    }

    function toLocalDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '날짜 정보 없음';
      return d.toLocaleString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
      });
    }

    function renderList(targetEl, items) {
      targetEl.innerHTML = '';
      if (!items.length) {
        const li = document.createElement('li');
        li.className = 'item';
        li.textContent = '수집된 기사가 없습니다.';
        targetEl.appendChild(li);
        return;
      }

      items.forEach((article) => {
        const li = document.createElement('li');
        li.className = 'item';

        const a = document.createElement('a');
        a.href = article.link;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = article.title;

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<span>${article.source}</span><span>${toLocalDate(article.pubDate)}</span>`;

        li.appendChild(a);
        li.appendChild(meta);
        targetEl.appendChild(li);
      });
    }

    function splitByCategory(rows) {
      return {
        [CATEGORY.MORTGAGE]: rows.filter((r) => r.category === CATEGORY.MORTGAGE),
        [CATEGORY.REAL_ESTATE]: rows.filter((r) => r.category === CATEGORY.REAL_ESTATE),
        [CATEGORY.KOREAN_AMERICAN]: rows.filter((r) => r.category === CATEGORY.KOREAN_AMERICAN)
      };
    }

    function withCategory(items, category) {
      return items.map((item) => ({ ...item, category }));
    }

    function setStatus(message) {
      els.status.textContent = message;
    }

    function validateMustInclude(byCategory) {
      const hasMortgage = byCategory[CATEGORY.MORTGAGE].length > 0;
      const hasKorean = byCategory[CATEGORY.KOREAN_AMERICAN].length > 0;
      const missing = [];
      if (!hasMortgage) missing.push('모기지 금리 기사');
      if (!hasKorean) missing.push('미주 한인 기사');
      return { hasMortgage, hasKorean, missing };
    }

    async function collectCategory(feed) {
      const rssUrl = buildGoogleRssUrl(feed.query);
      const items = await fetchGoogleRssItems(rssUrl);
      return dedupeByLink(sortByRecent(items)).slice(0, 15);
    }

    async function refreshClips() {
      els.refreshBtn.disabled = true;
      setStatus('뉴스 수집 중...');

      try {
        const settled = await Promise.allSettled(FEEDS.map((feed) => collectCategory(feed)));

        const rows = [];
        const errors = [];

        settled.forEach((result, idx) => {
          const category = FEEDS[idx].category;
          if (result.status === 'fulfilled') {
            rows.push(...withCategory(result.value, category));
          } else {
            errors.push(`${FEEDS[idx].label}: ${result.reason?.message || '수집 실패'}`);
          }
        });

        let byCategory = splitByCategory(rows);

        if (byCategory[CATEGORY.MORTGAGE].length === 0) {
          rows.push({ ...FALLBACK_MORTGAGE_ARTICLE, category: CATEGORY.MORTGAGE });
          byCategory = splitByCategory(rows);
        }

        const check = validateMustInclude(byCategory);

        renderList(els.listMortgage, byCategory[CATEGORY.MORTGAGE]);
        renderList(els.listRealEstate, byCategory[CATEGORY.REAL_ESTATE]);
        renderList(els.listKoreanAmerican, byCategory[CATEGORY.KOREAN_AMERICAN]);

        els.countMortgage.textContent = `${byCategory[CATEGORY.MORTGAGE].length}건`;
        els.countRealEstate.textContent = `${byCategory[CATEGORY.REAL_ESTATE].length}건`;
        els.countKoreanAmerican.textContent = `${byCategory[CATEGORY.KOREAN_AMERICAN].length}건`;

        if (check.missing.length) {
          els.mustIncludeState.className = 'requirement warn';
          els.mustIncludeState.textContent = `요구 조건 미충족: ${check.missing.join(', ')}`;
        } else {
          els.mustIncludeState.className = 'requirement ok';
          els.mustIncludeState.textContent = '필수 조건 충족: 모기지 금리 기사 + 미주 한인 기사 포함';
        }

        const now = toLocalDate(new Date().toISOString());
        if (errors.length) {
          setStatus(`부분 갱신 완료 (${now})`);
          console.warn('Category fetch errors:', errors);
        } else {
          setStatus(`마지막 갱신: ${now}`);
        }
      } catch (error) {
        setStatus('수집 실패');
        els.mustIncludeState.className = 'requirement warn';
        els.mustIncludeState.textContent = `오류: ${error.message}`;
      } finally {
        els.refreshBtn.disabled = false;
      }
    }

    els.refreshBtn.addEventListener('click', refreshClips);
    refreshClips();
    setInterval(refreshClips, 30 * 60 * 1000);
  </script>
</body>
</html>
